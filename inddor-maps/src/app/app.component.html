<ion-app>
  <ion-menu contentId="main-content">
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>Indoor Maps</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <ion-list>
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/home" routerDirection="root">
            <ion-icon slot="start" name="map-outline"></ion-icon>
            <ion-label>Editor de Mapas</ion-label>
          </ion-item>
          <ion-item routerLink="/ble-devices" routerDirection="root">
            <ion-icon slot="start" name="bluetooth-outline"></ion-icon>
            <ion-label>Dispositivos BLE</ion-label>
          </ion-item>
          <ion-item routerLink="/study" routerDirection="root">
            <ion-icon slot="start" name="analytics-outline"></ion-icon>
            <ion-label>Estudio de Cobertura</ion-label>
          </ion-item>
          <ion-item routerLink="/installation" routerDirection="root">
            <ion-icon slot="start" name="build-outline"></ion-icon>
            <ion-label>Guía de Instalación</ion-label>
          </ion-item>
          <ion-item routerLink="/revision" routerDirection="root">
            <ion-icon slot="start" name="eye-outline"></ion-icon>
            <ion-label>Revisión de Instalación</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>
  
  <div class="ion-page" id="main-content">
    <ion-router-outlet></ion-router-outlet>
  </div>
</ion-app>
