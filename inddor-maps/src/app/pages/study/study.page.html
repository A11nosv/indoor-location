<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Estudio de Cobertura BLE</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="importMap()">
        <ion-icon slot="start" name="map-outline"></ion-icon>
        Importar Mapa
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" scrollY="false">
  <div class="study-layout">
    <div class="toolbar-side">
      <ion-list>
        <ion-list-header>
          <ion-label>Análisis de Triangulación</ion-label>
        </ion-list-header>

        <ion-item button (click)="addBeaconManually()">
          <ion-icon slot="start" name="bluetooth-outline"></ion-icon>
          <ion-label>Posicionar Baliza</ion-label>
        </ion-item>

        <ion-item button (click)="generateAnalysis()" [color]="showHeatmap ? 'success' : ''">
          <ion-icon slot="start" name="analytics-outline"></ion-icon>
          <ion-label>Mostrar Mapa de Calor</ion-label>
        </ion-item>

        <ion-list-header>
          <ion-label>Inteligencia Artificial</ion-label>
        </ion-list-header>

        <ion-item button (click)="proposeOptimization()" color="secondary">
          <ion-icon slot="start" name="color-wand-outline"></ion-icon>
          <ion-label>Propuesta Automática</ion-label>
        </ion-item>
      </ion-list>

      <div class="legend" *ngIf="showHeatmap">
        <h6>Calidad de Triangulación</h6>
        <div class="gradient-bar"></div>
        <div class="legend-labels">
          <span>Baja</span>
          <span>Alta</span>
        </div>
      </div>
    </div>

    <div class="canvas-area">
      <div class="map-info" *ngIf="currentMap$ | async as map">
        <span>{{map.name}} | Balizas: {{ (map.objects | filterBeacons).length }}</span>
      </div>
      <app-map-editor></app-map-editor>
    </div>
  </div>
</ion-content>
